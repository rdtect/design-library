name: Deploy rdtect.com

on:
  push:
    branches: [main]
    paths:
      - 'apps/rdtect-com/**'
      - 'packages/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build design library packages
        run: bun run build --filter=@rdtect/tokens --filter=@rdtect/tailwind-preset --filter=@rdtect/ui

      - name: Build rdtect.com
        run: bun run build --filter=@rdtect/rdtect-com

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/rdtect-com/build --project-name=rdtect-com --commit-dirty=true
